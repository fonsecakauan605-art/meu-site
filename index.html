<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA: KAUAN & MARIA ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff4d6d;
            --neon-green: #39ff14;
            --bg-dark: #0f0104;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* TELA DE ENTRADA */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #start-btn {
            background: transparent;
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
            padding: 20px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-red);
            text-transform: uppercase;
        }

        /* SITE PRINCIPAL */
        #main-content {
            display: none;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        .card {
            border: 1px solid var(--neon-red);
            background: rgba(255, 77, 109, 0.05);
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .card-label {
            position: absolute;
            top: -10px; left: 10px;
            background: var(--bg-dark);
            padding: 0 10px;
            color: var(--neon-red);
            font-size: 0.7rem;
        }

        .photo-container {
            width: 200px; height: 200px;
            margin: 0 auto 15px;
            border: 2px solid var(--neon-red);
            overflow: hidden;
        }

        .photo-container img {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .timer-box {
            border: 1px solid rgba(255, 77, 109, 0.3);
            padding: 10px;
        }

        .timer-val {
            color: var(--neon-green);
            font-size: 1.2rem;
            display: block;
        }

        .heart {
            position: fixed;
            top: -20px;
            color: var(--neon-red);
            z-index: 5;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="loader">
        <p style="color: var(--neon-green); margin-bottom: 20px;">> AQUECENDO MOTORES...</p>
        <button id="start-btn" onclick="entrar()">[ LIBERAR ACESSO ]</button>
    </div>

    <div id="main-content">
        <header style="margin-bottom: 30px;">

        </header>

        <section class="card">
            <span class="card-label">> IDENTIFICAÇÃO</span>
            <div class="photo-container">
                <img src="amor.jpeg.jpeg" alt="FOTO">
            </div>
            <p style="font-size: 1.5rem; font-weight: bold; margin: 5px 0;">MARIA</p>
            <p style="color: var(--neon-red); font-size: 0.7rem;">RANK: NAMORADA PERFEITA</p>
        </section>

        <section class="card">
            <span class="card-label">> TEMPO_CONECTADOS</span>
            <div class="timer-grid">
                <div class="timer-box"><span class="timer-val" id="d">00</span><span style="font-size:0.5rem">DIAS</span></div>
                <div class="timer-box"><span class="timer-val" id="h">00</span><span style="font-size:0.5rem">HORAS</span></div>
                <div class="timer-box"><span class="timer-val" id="m">00</span><span style="font-size:0.5rem">MIN</span></div>
                <div class="timer-box"><span class="timer-val" id="s">00</span><span style="font-size:0.5rem">SEG</span></div>
            </div>
        </section>

        <section class="card">
            <span class="card-label">> MENSAGEM</span>
            <p style="font-size: 0.9rem;">"Foi assim quando eu te vi a primeira vez..."</p>
            <p style="color: var(--neon-red); font-weight: bold;">TE AMO MUITO!</p>
        </section>

        <audio id="musica" loop>
            <source src="https://files.catbox.moe/p94wgu.mp3" type="audio/mpeg">
        </audio>
    </div>
