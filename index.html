<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAUAN & MARIA ❤️</title>
    <style>
        :root {
            --neon-red: #ff4d6d;
            --neon-green: #39ff14;
            --bg-dark: #0a0104;
            --font-destaque: 'Syne', sans-serif;
        }

        body { background-color: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 100px; }

        /* NAVEGAÇÃO */
        nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            padding: 12px; border-radius: 30px; display: flex; z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1); width: 90%; max-width: 400px; justify-content: space-around;
        }
        nav button { background: none; border: none; color: #aaa; font-weight: bold; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; }
        nav button.active { color: var(--neon-red); transform: scale(1.1); }

        .tab-content { display: none; padding: 20px; animation: fadeIn 0.5s ease; max-width: 500px; margin: 0 auto; text-align: center; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .card { border: 2px solid rgba(255, 77, 109, 0.2); background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 20px; margin-bottom: 20px; }

        /* CONTADOR COM FOTOS DE FUNDO */
        .timer-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .timer-box { 
            height: 100px; border-radius: 15px; position: relative; overflow: hidden; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 2px solid var(--neon-red); background-size: cover; background-position: center;
        }
        .timer-box::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 1; }
        .timer-val, small { position: relative; z-index: 2; font-weight: bold; }
        .timer-val { color: var(--neon-green); font-size: 1.8rem; }

        /* GALERIA DE FOTOS */
        .galeria-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .galeria-item { width: 100%; height: 140px; border-radius: 15px; overflow: hidden; border: 1px solid var(--neon-red); }
        .galeria-item img { width: 100%; height: 100%; object-fit: cover; }

        /* BÚSSOLA */
        .compass { width: 70px; height: 70px; border: 2px solid var(--neon-red); border-radius: 50%; margin: 20px auto; position: relative; }
        .arrow { width: 2px; height: 30px; background: var(--neon-red); position: absolute; top: 15%; left: 49%; transform-origin: bottom center; animation: girar 4s infinite linear; }
        @keyframes girar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* BOTÕES E INPUTS */
        .btn-interativo { background: var(--neon-red); border: none; padding: 12px; color: white; border-radius: 10px; cursor: pointer; width: 95%; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
        .input-estilizado { padding: 12px; border-radius: 10px; border: 1px solid var(--neon-red); background: #111; color: white; width: 85%; margin-bottom: 10px; outline: none; }
    </style>
</head>
<body>

    <nav>
        <button onclick="showTab('inicio')" id="btn-inicio" class="active">INÍCIO</button>
        <button onclick="showTab('fotos')" id="btn-fotos">FOTOS</button>
        <button onclick="showTab('interacoes')" id="btn-interacoes">INTERAÇÕES</button>
    </nav>

    <!-- ABA INÍCIO -->
    <main id="inicio" class="tab-content active">
        <section class="card">
            <h1 style="font-family: var(--font-destaque); letter-spacing: 2px;">KAUAN & MARIA</h1>
            <div class="timer-grid">
                <div class="timer-box" style="background-image: url('amor1.jpeg.jpeg');"><span class="timer-val" id="d">00</span><small>DIAS</small></div>
                <div class="timer-box" style="background-image: url('Amor1.jpeg.jpeg');"><span class="timer-val" id="h">00</span><small>HORAS</small></div>
                <div class="timer-box" style="background-image: url('amor3.jpeg.jpeg');"><span class="timer-val" id="m">00</span><small>MINUTOS</small></div>
                <div class="timer-box" style="background-image: url('amor4.jpeg.jpeg');"><span class="timer-val" id="s">00</span><small>SEGUNDOS</small></div>
            </div>
            <button class="btn-interativo" onclick="pedirPermissao()" style="background: #222; font-size: 0.65rem; margin-top: 25px;">🔔 Ativar Notificações do Nosso Site</button>
        </section>
    </main>

    <!-- ABA FOTOS -->
    <main id="fotos" class="tab-content">
        <div class="galeria-grid">
            <div class="galeria-item"><img src="amor.jpeg.jpeg"></div>
            <div class="galeria-item"><img src="amor1.jpeg.jpeg"></div>
            <div class="galeria-item"><img src="Amor1.jpeg.jpeg"></div>
            <div class="galeria-item"><img src="amor3.jpeg.jpeg"></div>
            <div class="galeria-item"><img src="amor4.jpeg.jpeg"></div>
        </div>
    </main>

    <!-- ABA INTERAÇÕES -->
    <main id="interacoes" class="tab-content">
        <section class="card">
            <h3 style="color: var(--neon-red);">BÚSSOLA DO AMOR</h3>
            <div class="compass"><div class="arrow"></div></div>
            <p style="font-size: 0.7rem;">Sempre para você.</p>
        </section>

        <section class="card">
            <h3 style="color: var(--neon-red);">MURAL DE RECADOS</h3>
            <div id="mural" style="color: var(--neon-green); margin-bottom: 15px; font-style: italic;">"Deixe seu recado..."</div>
            <input type="text" id="input-mural" class="input-estilizado" placeholder="Escreva algo...">
            <button class="btn-interativo" onclick="postarRecado()">Colar no Mural ✏️</button>
        </section>

        <section class="card">
            <h3 style="color: var(--neon-red);">CÁPSULA DO TEMPO ⏳</h3>
            <textarea id="texto-capsula" class="input-estilizado" style="height: 60px;" placeholder="Mensagem para o futuro..."></textarea>
            <button class="btn-interativo" onclick="salvarCapsula()">Trancar na Cápsula</button>
        </section>

        <section class="card">
            <h3 style="color: var(--neon-red);">SAUDADEÔMETRO</h3>
            <div style="font-size: 2.5rem; color: var(--neon-green); font-weight: bold;" id="count-saudade">0</div>
            <button class="btn-interativo" onclick="aumentarSaudade()">Pensei em Você ❤️</button>
        </section>
    </main>

    <script>
        // Sistema de Notificações
        function pedirPermissao() {
            if (Notification.permission !== "granted") {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        new Notification("K & M ❤️", { body: "Prontinho! Agora vocês receberão nossos alertas de amor." });
                    }
                });
            } else {
                alert("As notificações já estão ativadas!");
            }
        }

        function enviarNotif(titulo, msg) {
            if (Notification.permission === "granted") {
                new Notification(titulo, { body: msg });
            }
        }

        // Troca de Abas
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
        }

        // Funções de Interação
        function postarRecado() {
            const txt = document.getElementById('input-mural').value;
            if(txt) {
                document.getElementById('mural').innerText = `"${txt}"`;
                enviarNotif("Mural Atualizado! ✏️", txt);
                document.getElementById('input-mural').value = "";
            }
        }

        function salvarCapsula() {
            if(document.getElementById('texto-capsula').value) {
                alert("Cápsula trancada! Só poderá ser aberta em 15/11/2026.");
                document.getElementById('texto-capsula').value = "";
            }
        }

        let saudades = 0;
        function aumentarSaudade() {
            saudades++;
            document.getElementById('count-saudade').innerText = saudades;
            enviarNotif("Aviso de Amor ❤️", "Alguém acabou de sentir sua falta!");
        }

        // Contador Automático
        function atualizarTimer() {
            // DATA AJUSTADA: 15 de Novembro de 2025 às 00:30
            const dataAlvo = new Date(2025, 10, 15, 0, 30, 0); 
            const agora = new Date();
            const diff = agora - dataAlvo;

            const d = Math.floor(Math.max(0, diff) / (1000 * 60 * 60 * 24));
            const h = Math.floor((Math.max(0, diff) / (1000 * 60 * 60)) % 24);
            const m = Math.floor((Math.max(0, diff) / 1000 / 60) % 60);
            const s = Math.floor((Math.max(0, diff) / 1000) % 60);

            document.getElementById('d').innerText = d < 10 ? '0'+d : d;
            document.getElementById('h').innerText = h < 10 ? '0'+h : h;
            document.getElementById('m').innerText = m < 10 ? '0'+m : m;
            document.getElementById('s').innerText = s < 10 ? '0'+s : s;
        }

        setInterval(atualizarTimer, 1000);
        atualizarTimer();
    </script>
</body>
</html>
