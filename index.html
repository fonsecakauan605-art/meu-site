<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA: KAUAN & MARIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000; /* Fundo preto total */
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* TELA DE ENTRADA */
        #loader {
            text-align: center;
            z-index: 10000;
        }

        /* BOTÃO CHAMATIVO - PARA NÃO FICAR TUDO PRETO */
        #start-btn {
            background-color: #ff4d6d; /* Rosa Choque */
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 0 20px #ff4d6d;
            text-transform: uppercase;
        }

        #start-btn:hover {
            transform: scale(1.1);
        }

        /* CONTEÚDO DO SITE (ESCONDIDO) */
        #main-content {
            display: none;
            width: 100%;
            height: 100vh;
            background-color: #0f0104;
            overflow-y: auto;
            position: absolute;
            top: 0;
            left: 0;
            text-align: center;
            padding-top: 50px;
        }

        .heart {
            position: fixed;
            top: -20px;
            color: #ff4d6d;
            z-index: 5;
            animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <button id="start-btn" onclick="entrar()">CLIQUE PARA ENTRAR ❤️</button>
    </div>

    <div id="main-content">
        <h1 style="font-family: 'Orbitron'; color: #ff4d6d;">KAUAN & MARIA</h1>
        
        <div style="border: 2px solid #ff4d6d; display: inline-block; padding: 20px; margin-top: 20px;">
            <p style="font-size: 1.2rem;">Tempo de União:</p>
            <p id="timer" style="font-size: 1.5rem; color: #39ff14; font-weight: bold;"></p>
        </div>

        <div style="margin-top: 40px; padding: 20px;">
            <p>"Foi assim quando eu te vi a primeira vez..."</p>
            <p><strong>Eu te amo muito!</strong></p>
        </div>

        <div id="music-container"></div>
    </div>

    <script>
        function entrar() {
            // Esconde o botão e mostra o site
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            // Carrega a música do Sotam nos 49 segundos
            const videoID = "vUI2PT3rKts"; 
            const musicContainer = document.getElementById('music-container');
            musicContainer.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoID}?autoplay=1&start=49" style="display:none;" allow="autoplay"></iframe>`;

            // Ativa corações
            setInterval(createHeart, 500);
        }

        // Contador
        const dataInicio = new Date(2025, 10, 15, 20, 30); 
        function atualizar() {
            const agora = new Date();
            const diff = agora - dataInicio;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);
            document.getElementById('timer').innerText = `${d}d ${h}h ${m}m ${s}s`;
        }
        setInterval(atualizar, 1000);
        atualizar();

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            const dur = Math.random() * 3 + 4;
            heart.style.animationDuration = dur + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), dur * 1000);
        }
    </script>
</body>
</html>
