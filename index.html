<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAUAN & MARIA ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;700&family=Syne:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff4d6d;
            --bg-dark: #0a0104;
            --font-destaque: 'Syne', sans-serif;
            --font-digital: 'Azeret Mono', monospace;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            margin: 0;
            overflow: hidden;
            font-family: var(--font-digital);
        }

        /* CONTAINER DA ABA PARA VOCÊ */
        #declaracao {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            position: relative;
        }

        canvas {
            display: block;
        }

        /* TEXTO CENTRAL IGUAL À FOTO */
        .overlay-text {
            position: absolute;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .overlay-text h2 {
            font-size: 2.5rem;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 20px var(--neon-red), 0 0 40px var(--neon-red);
            font-weight: 700;
        }

        .overlay-text p {
            font-size: 0.9rem;
            color: #ffb3c1;
            letter-spacing: 3px;
            margin-top: 10px;
            text-transform: lowercase;
        }

        /* LOADER INICIAL */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #start-btn {
            background: var(--neon-red);
            border: none;
            color: #fff;
            padding: 20px 40px;
            font-family: var(--font-destaque);
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--neon-red);
        }
    </style>
</head>
<body>

    <div id="loader">
        <button id="start-btn" onclick="iniciar()">Ver Declaração</button>
    </div>

    <main id="declaracao">
        <canvas id="heartCanvas"></canvas>
        <div class="overlay-text">
            <h2>I love you 🤍</h2>
            <p>my heart keeps choosing you</p>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const word = "I LOVE YOU";

        function iniciar() {
            document.getElementById('loader').style.display = 'none';
            resize();
            createParticles();
            animate();
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // Função matemática para desenhar o formato do coração
        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x: x * 15, y: y * 15 }; // Multiplicador para o tamanho do coração
        }

        class Particle {
            constructor() {
                this.t = Math.random() * Math.PI * 2;
                const point = getHeartPoint(this.t);
                this.baseX = point.x + canvas.width / 2;
                this.baseY = point.y + canvas.height / 2;
                
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                
                this.size = Math.random() * 10 + 5;
                this.speed = Math.random() * 0.05 + 0.02;
                this.opacity = Math.random();
            }

            update() {
                // Movimento de "respiração" e flutuação leve
                const point = getHeartPoint(this.t);
                this.baseX = point.x + canvas.width / 2;
                this.baseY = point.y + canvas.height / 2;

                // Segue o formato do coração com um leve atraso (suavidade)
                this.x += (this.baseX - this.x) * this.speed;
                this.y += (this.baseY - this.y) * this.speed;
                
                this.t += 0.01; // Faz as palavras girarem lentamente no contorno
                
                // Pulsação do tamanho
                this.size = Math.sin(Date.now() * 0.002 + this.x) * 5 + 10;
            }

            draw() {
                ctx.font = `bold ${this.size}px 'Azeret Mono'`;
                ctx.fillStyle = `rgba(255, 77, 109, ${this.opacity})`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#ff4d6d";
                ctx.fillText(word, this.x, this.y);
            }
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // Efeito de rastro leve (Motion Blur) igual aos vídeos
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
    </script>
</body>
</html>
