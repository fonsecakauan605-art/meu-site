<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAUAN & MARIA ❤️</title>
    <style>
        :root {
            --neon-red: #ff4d6d;
            --neon-green: #39ff14;
            --bg-dark: #0a0104;
            --cor-bloqueado: #444;
        }

        body { background-color: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }

        /* --- TELA DE LOGIN --- */
        #tela-login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 25px; 
            border: 1px solid var(--neon-red); width: 90%; max-width: 320px; text-align: center;
            backdrop-filter: blur(10px);
        }
        .input-login {
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; 
            border: 1px solid var(--neon-red); background: #111; color: #fff; 
            text-align: center; font-size: 1rem; box-sizing: border-box; outline: none;
        }
        .btn-login-casal { 
            background: var(--neon-red); color: #fff; border: none; padding: 15px; 
            width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; margin-bottom: 10px; 
        }
        .btn-login-visitante { 
            background: transparent; color: #888; border: 1px solid #444; 
            padding: 10px; width: 100%; border-radius: 12px; cursor: pointer; font-size: 0.8rem; 
        }

        /* --- SITE --- */
        #conteudo-site { display: none; }

        nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            padding: 12px; border-radius: 30px; display: flex; z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1); width: 90%; max-width: 400px; justify-content: space-around;
        }
        nav button { background: none; border: none; color: #aaa; font-weight: bold; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; }
        nav button.active { color: var(--neon-red); transform: scale(1.1); }

        .tab-content { display: none; padding: 20px; animation: fadeIn 0.5s ease; max-width: 500px; margin: 0 auto; text-align: center; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .card { border: 2px solid rgba(255, 77, 109, 0.2); background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 20px; margin-bottom: 20px; }

        .photo-container { width: 150px; height: 150px; margin: 0 auto 20px; border-radius: 50%; border: 4px solid var(--neon-red); overflow: hidden; box-shadow: 0 0 15px var(--neon-red); }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }

        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .timer-box { background: rgba(255, 255, 255, 0.05); padding: 15px 5px; border-radius: 12px; border: 1px solid rgba(255, 77, 109, 0.3); }
        .timer-val { color: var(--neon-green); font-size: 1.4rem; display: block; font-weight: bold; }
        small { font-size: 0.55rem; color: #aaa; text-transform: uppercase; }

        .galeria-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .galeria-item { width: 100%; height: 140px; border-radius: 15px; overflow: hidden; border: 1px solid var(--neon-red); }
        .galeria-item img { width: 100%; height: 100%; object-fit: cover; }

        .compass { width: 70px; height: 70px; border: 2px solid var(--neon-red); border-radius: 50%; margin: 20px auto; position: relative; }
        .arrow { width: 2px; height: 30px; background: var(--neon-red); position: absolute; top: 15%; left: 49%; transform-origin: bottom center; animation: girar 4s infinite linear; }
        @keyframes girar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #mural { background: rgba(57, 255, 20, 0.05); border-left: 4px solid var(--neon-green); padding: 15px; border-radius: 10px; color: var(--neon-green); font-style: italic; transition: opacity 0.3s; margin-bottom: 15px; }

        /* BOTÕES INTERATIVOS (BLOQUEADOS POR PADRÃO) */
        .btn-interativo { 
            background: var(--cor-bloqueado); 
            border: none; padding: 12px; color: white; 
            border-radius: 10px; cursor: not-allowed; 
            width: 95%; font-weight: bold; margin-top: 10px; 
            text-transform: uppercase; opacity: 0.5; transition: 0.4s;
        }
        .btn-interativo.admin-on { background: var(--neon-red); cursor: pointer; opacity: 1; box-shadow: 0 0 10px var(--neon-red); }
        
        .input-estilizado { padding: 12px; border-radius: 10px; border: 1px solid var(--neon-red); background: #111; color: white; width: 85%; margin-bottom: 10px; outline: none; }
        .input-estilizado:disabled { opacity: 0.4; cursor: not-allowed; border-color: #333; }

        .coracao-caindo { position: fixed; top: -20px; font-size: 20px; z-index: 9999; pointer-events: none; animation: cair 3s linear forwards; }
        @keyframes cair { to { transform: translateY(105vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="tela-login">
        <div class="login-card">
            <h2 style="color: var(--neon-red); margin-bottom: 15px;">K & M ❤️</h2>
            <input type="password" id="senhaInput" class="input-login" placeholder="Senha do Casal">
            <button class="btn-login-casal" onclick="fazerLogin('casal')">Entrar como Casal</button>
            <button class="btn-login-visitante" onclick="fazerLogin('visitante')">Entrar como Visitante</button>
        </div>
    </div>

    <!-- SITE -->
    <div id="conteudo-site">
        <nav>
            <button onclick="showTab('inicio')" id="btn-inicio" class="active">INÍCIO</button>
            <button onclick="showTab('fotos')" id="btn-fotos">FOTOS</button>
            <button onclick="showTab('interacoes')" id="btn-interacoes">INTERAÇÕES</button>
        </nav>

        <main id="inicio" class="tab-content active">
            <section class="card">
                <div class="photo-container"><img src="amor.jpeg.jpeg"></div>
                <h1 style="letter-spacing: 2px; font-size: 1.5rem; margin-bottom: 20px;">KAUAN & MARIA</h1>
                <div class="timer-grid">
                    <div class="timer-box"><span class="timer-val" id="d">00</span><small>Dias</small></div>
                    <div class="timer-box"><span class="timer-val" id="h">00</span><small>Hrs</small></div>
                    <div class="timer-box"><span class="timer-val" id="m">00</span><small>Min</small></div>
                    <div class="timer-box"><span class="timer-val" id="s">00</span><small>Seg</small></div>
                </div>
                <p id="modo-txt" style="font-size: 0.7rem; color: #666; margin-top: 20px;"></p>
            </section>
    </main>

    <main id="fotos" class="tab-content">
        <div class="galeria-grid">
            <div class="galeria-item"><img src="amor.jpeg.jpeg"></div>
            <div class="galeria-item"><img src="amor1.jpeg.jpeg"></div>
            <div class="galeria-item"><img src="amor2.jpeg.jpeg"></div>
            <div class="galeria-item"><img src="amor3.jpeg.jpeg"></div>
            <div class="galeria-item"><img src="amor4.jpeg.jpeg"></div>
        </div>
    </main>

    <main id="interacoes" class="tab-content">
        <section class="card">
            <h3>BÚSSOLA DO AMOR</h3>
            <div class="compass"><div class="arrow"></div></div>
        </section>

        <section class="card">
            <h3>MURAL DE RECADOS</h3>
            <div id="mural">"Deixe um recado especial aqui..."</div>
            <input type="text" id="input-mural" class="input-estilizado" placeholder="Bloqueado para visitantes" disabled>
            <button class="btn-interativo" id="btn-mural" onclick="postarRecado()">Enviar Recado ✏️</button>
        </section>

        <section class="card">
            <h3>SAUDADEÔMETRO</h3>
            <div style="font-size: 2.5rem; color: var(--neon-green); font-weight: bold;" id="count-saudade">0</div>
            <button class="btn-interativo" id="btn-saudade" onclick="aumentarSaudade()">Pensei em Você ❤️</button>
        </section>
    </main>
    </div>

    <script>
        const SENHA_ADMIN = "2008";
        let isAdmin = false;

        function fazerLogin(tipo) {
            if (tipo === 'casal') {
                const senha = document.getElementById('senhaInput').value;
                if (senha === SENHA_ADMIN) {
                    isAdmin = true;
                    liberarSite("Modo Casal ❤️");
                } else { alert("Senha incorreta!"); return; }
            } else {
                isAdmin = false;
                liberarSite("Modo Visitante");
            }
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('conteudo-site').style.display = 'block';
        }

        function liberarSite(msg) {
            document.getElementById('modo-txt').innerText = msg;
            if (isAdmin) {
                document.querySelectorAll('.btn-interativo').forEach(b => b.classList.add('admin-on'));
                document.getElementById('input-mural').disabled = false;
                document.getElementById('input-mural').placeholder = "Escreva algo fofo...";
            }
        }

        let saudades = localStorage.getItem("sCount") ? parseInt(localStorage.getItem("sCount")) : 0;
        document.getElementById('count-saudade').innerText = saudades;

        function aumentarSaudade() {
            if(!isAdmin) return;
            saudades++;
            document.getElementById('count-saudade').innerText = saudades;
            localStorage.setItem("sCount", saudades);
            for(let i=0; i<15; i++) setTimeout(criarCoracao, i*150);
        }

        function criarCoracao() {
            const c = document.createElement("div");
            c.className = "coracao-caindo";
            c.innerText = "❤️";
            c.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 3000);
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
        }

        function postarRecado() {
            if(!isAdmin) return;
            const input = document.getElementById('input-mural');
            if(input.value.trim() !== "") {
                document.getElementById('mural').innerText = `"${input.value}"`;
                input.value = "";
            }
        }

        function atualizarTimer() {
            const dataAlvo = new Date(2025, 10, 15, 0, 30, 0); 
            const agora = new Date();
            const diff = agora - dataAlvo;
            document.getElementById('d').innerText = Math.floor(Math.max(0, diff) / 86400000);
            document.getElementById('h').innerText = Math.floor((Math.max(0, diff) / 3600000) % 24);
            document.getElementById('m').innerText = Math.floor((Math.max(0, diff) / 60000) % 60);
            document.getElementById('s').innerText = Math.floor((Math.max(0, diff) / 1000) % 60);
        }
        setInterval(atualizarTimer, 1000);
        atualizarTimer();
    </script>
</body>
</html>
