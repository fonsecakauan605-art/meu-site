<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAUAN & MARIA ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Syne:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff4d6d;
            --neon-green: #39ff14;
            --neon-blue: #00f2ff;
            --bg-dark: #0f0104;
            --font-destaque: 'Syne', sans-serif;
            --font-corpo: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: var(--font-corpo);
            margin: 0;
            padding-bottom: 100px; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #start-btn {
            background: var(--neon-red);
            border: none;
            color: #fff;
            padding: 22px 50px;
            font-family: var(--font-destaque);
            border-radius: 50px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.4);
        }

        nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 10px 20px;
            border-radius: 30px;
            display: none;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 85%;
            max-width: 400px;
            justify-content: space-around;
        }

        nav button {
            background: none;
            border: none;
            color: #aaa;
            font-family: var(--font-destaque);
            font-size: 0.7rem;
            cursor: pointer;
        }

        nav button.active { color: var(--neon-red); transform: scale(1.1); }

        .tab-content {
            display: none;
            padding: 20px;
            animation: fadeIn 0.5s ease;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .card {
            border: 2px solid rgba(255, 77, 109, 0.2);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .btn-interativo {
            background: var(--neon-red);
            border: none;
            padding: 12px;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-family: var(--font-destaque);
            width: 100%;
            margin-top: 10px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .input-style {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 77, 109, 0.5);
            background: rgba(0,0,0,0.3);
            color: white;
            box-sizing: border-box;
            margin-top: 10px;
        }

        .contador-sdd {
            font-size: 2.5rem;
            color: var(--neon-red);
            font-family: var(--font-destaque);
            display: block;
            text-shadow: 0 0 15px rgba(255, 77, 109, 0.5);
        }

        /* ESTILO DOS HUMORES */
        .mood-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .mood-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .mood-btn:hover { background: var(--neon-red); }

        .heart { position: fixed; top: -20px; color: var(--neon-red); z-index: 5; animation: fall linear forwards; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* MURAL */
        #mural-texto {
            font-style: italic;
            color: var(--neon-blue);
            margin: 10px 0;
            display: block;
        }
    </style>
</head>
<body>

    <div id="loader">
        <button id="start-btn" onclick="entrar()">Acessar Sistema</button>
    </div>

    <nav id="main-nav">
        <button onclick="showTab('inicio')" id="btn-inicio" class="active">INÍCIO</button>
        <button onclick="showTab('fotos')" id="btn-fotos">FOTOS</button>
        <button onclick="showTab('interacoes')" id="btn-interacoes">INTERAÇÕES</button>
    </nav>

    <main id="inicio" class="tab-content active">
        <section class="card">
            <h1 style="font-family: var(--font-destaque);">KAUAN & MARIA</h1>
            <p style="color: var(--neon-red); font-weight: bold;">JUNTOS HÁ</p>
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                <div class="card" style="padding: 10px; margin: 0;"><span id="d" style="color: var(--neon-green);">00</span><br><small>DIAS</small></div>
                <div class="card" style="padding: 10px; margin: 0;"><span id="h" style="color: var(--neon-green);">00</span><br><small>HRS</small></div>
                <div class="card" style="padding: 10px; margin: 0;"><span id="m" style="color: var(--neon-green);">00</span><br><small>MIN</small></div>
                <div class="card" style="padding: 10px; margin: 0;"><span id="s" style="color: var(--neon-green);">00</span><br><small>SEG</small></div>
            </div>
        </section>
    </main>

    <main id="fotos" class="tab-content">
        <h2 style="font-family: var(--font-destaque);">MEMÓRIAS</h2>
        <p>Espaço reservado para suas fotos!</p>
    </main>

    <main id="interacoes" class="tab-content">
        <h2 style="font-family: var(--font-destaque);">PLAYGROUND ❤️</h2>

        <div class="card">
            <h3 style="font-size: 0.7rem; text-transform: uppercase;">Aviso Imediato</h3>
            <button class="btn-interativo" onclick="chuvaCidadao()" style="background: var(--neon-blue); color: #000;">Tô pensando em você agora! ⚡</button>
        </div>

        <div class="card">
            <h3 style="font-size: 0.7rem; text-transform: uppercase;">Mural de Recados</h3>
            <span id="mural-texto">"Nenhum recado ainda..."</span>
            <input type="text" id="input-mural" class="input-style" placeholder="Deixe um recado rápido...">
            <button class="btn-interativo" onclick="atualizarMural()">Colar Recado 📌</button>
        </div>

        <div class="card">
            <h3 style="font-size: 0.7rem; text-transform: uppercase;">Como eu tô hoje?</h3>
            <div class="mood-grid">
                <button class="mood-btn" onclick="setMood('Feliz! 😍')">😍</button>
                <button class="mood-btn" onclick="setMood('Com sono... 😴')">😴</button>
                <button class="mood-btn" onclick="setMood('Carente 🥺')">🥺</button>
                <button class="mood-btn" onclick="setMood('Estressado(a) 😤')">😤</button>
                <button class="mood-btn" onclick="setMood('Te amando muito! ❤️')">❤️</button>
                <button class="mood-btn" onclick="setMood('Com fome 🍕')">🍕</button>
            </div>
            <p id="current-mood" style="margin-top: 10px; font-size: 0.8rem; color: var(--neon-green);"></p>
        </div>

        <div class="card">
            <h3 style="font-size: 0.7rem; text-transform: uppercase;">Saudômetro</h3>
            <span class="contador-sdd" id="sdd-count">0</span>
            <button class="btn-interativo" onclick="matarSaudade()">Aumentar Saudade +1</button>
        </div>

        <div class="card" id="capsula-container">
            <h3 style="font-size: 0.7rem; text-transform: uppercase;">Cápsula do Tempo ⏳</h3>
            <div id="capsula-form">
                <textarea id="texto-capsula" class="input-style" rows="3" placeholder="Escreva algo para lerem em 1 ano..."></textarea>
                <button class="btn-interativo" onclick="selarCapsula()" style="background: #fff; color: #000;">Selar Cápsula</button>
            </div>
            <div id="capsula-status" style="display:none;">
                <p id="countdown-capsula" style="color: var(--neon-red);"></p>
            </div>
        </div>
    </main>

    <script>
        function entrar() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-nav').style.display = 'flex';
            carregarDados();
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
        }

        // TIMER
        const dataInicio = new Date(2025, 10, 15, 20, 30); 
        setInterval(() => {
            const diff = new Date() - dataInicio;
            document.getElementById('d').innerText = Math.floor(diff / 86400000);
            document.getElementById('h').innerText = Math.floor((diff / 3600000) % 24).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff / 60000) % 60).toString().padStart(2, '0');
            document.getElementById('s').innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
        }, 1000);

        // INTERAÇÕES
        function chuvaCidadao() {
            for(let i=0; i<30; i++) setTimeout(createHeart, i*50);
        }

        function createHeart() {
            const h = document.createElement('div');
            h.classList.add('heart'); h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            const dur = Math.random() * 2 + 3;
            h.style.animationDuration = dur + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), dur * 1000);
        }

        function atualizarMural() {
            const txt = document.getElementById('input-mural').value;
            if(!txt) return;
            localStorage.setItem('mural', txt);
            document.getElementById('mural-texto').innerText = `"${txt}"`;
            document.getElementById('input-mural').value = "";
        }

        function setMood(mood) {
            localStorage.setItem('meu_mood', mood);
            document.getElementById('current-mood').innerText = "Status atual: " + mood;
        }

        let sdds = localStorage.getItem('saudades') || 0;
        function matarSaudade() {
            sdds++; localStorage.setItem('saudades', sdds);
            document.getElementById('sdd-count').innerText = sdds;
            createHeart();
        }

        function selarCapsula() {
            const txt = document.getElementById('texto-capsula').value;
            if(txt.length < 5) return;
            localStorage.setItem('capsula_texto', txt);
            localStorage.setItem('capsula_data', new Date().getTime());
            verificarCapsula();
        }

        function verificarCapsula() {
            const data = localStorage.getItem('capsula_data');
            if(data) {
                document.getElementById('capsula-form').style.display = 'none';
                document.getElementById('capsula-status').style.display = 'block';
                const lib = new Date(parseInt(data)); lib.setFullYear(lib.getFullYear() + 1);
                setInterval(() => {
                    const dist = lib - new Date();
                    if(dist < 0) {
                        document.getElementById('capsula-status').innerHTML = `🔓 Aberta: "${localStorage.getItem('capsula_texto')}"`;
                    } else {
                        document.getElementById('countdown-capsula').innerText = `Libera em: ${Math.floor(dist/86400000)} dias`;
                    }
                }, 1000);
            }
        }

        function carregarDados() {
            document.getElementById('sdd-count').innerText = sdds;
            if(localStorage.getItem('mural')) document.getElementById('mural-texto').innerText = `"${localStorage.getItem('mural')}"`;
            if(localStorage.getItem('meu_mood')) document.getElementById('current-mood').innerText = "Status atual: " + localStorage.getItem('meu_mood');
            verificarCapsula();
        }
    </script>
</body>
</html>
