<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAUAN & MARIA ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Syne:wght@700&family=Azeret+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff4d6d;
            --neon-green: #39ff14;
            --neon-blue: #00f2ff;
            --bg-dark: #0a0104;
            --font-destaque: 'Syne', sans-serif;
            --font-corpo: 'Inter', sans-serif;
            --font-digital: 'Azeret Mono', monospace;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: var(--font-corpo);
            margin: 0;
            padding-bottom: 100px; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* TELA DE ENTRADA */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #start-btn {
            background: var(--neon-red);
            border: none;
            color: #fff;
            padding: 22px 50px;
            font-family: var(--font-destaque);
            border-radius: 50px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.4);
        }

        /* NAVEGAÇÃO */
        nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 10px 15px;
            border-radius: 30px;
            display: none;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 450px;
            justify-content: space-between;
        }

        nav button {
            background: none;
            border: none;
            color: #aaa;
            font-family: var(--font-destaque);
            font-size: 0.65rem;
            cursor: pointer;
            transition: 0.3s;
            padding: 10px 5px;
        }

        nav button.active { color: var(--neon-red); transform: scale(1.1); }

        /* SEÇÕES */
        .tab-content {
            display: none;
            padding: 20px;
            animation: fadeIn 0.5s ease;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            border: 2px solid rgba(255, 77, 109, 0.2);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* ESTILO DA ABA DE DECLARAÇÃO (FOTO) */
        .heart-ascii-container {
            background: #000;
            padding: 40px 10px;
            border-radius: 15px;
            border: 1px solid #1a0005;
            position: relative;
            overflow: hidden;
        }

        .ascii-text {
            font-family: var(--font-digital);
            font-size: 6px;
            line-height: 6px;
            color: var(--neon-red);
            text-shadow: 0 0 5px var(--neon-red);
            white-space: pre;
            display: inline-block;
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            from { text-shadow: 0 0 2px var(--neon-red); opacity: 0.8; }
            to { text-shadow: 0 0 12px var(--neon-red); opacity: 1; }
        }

        .floating-message {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            pointer-events: none;
        }

        .floating-message h2 {
            font-size: 2.2rem;
            margin: 0;
            font-family: var(--font-digital);
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        .floating-message p {
            font-family: var(--font-digital);
            font-size: 0.8rem;
            margin-top: 5px;
            letter-spacing: 1px;
            color: #ffb3c1;
        }

        /* OUTROS ESTILOS */
        .btn-interativo {
            background: var(--neon-red); border: none; padding: 12px; color: white;
            border-radius: 12px; cursor: pointer; font-family: var(--font-destaque);
            width: 100%; margin-top: 10px; text-transform: uppercase; font-size: 0.8rem;
        }

        .input-style {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255, 77, 109, 0.5);
            background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; margin-top: 10px;
        }

        .photo-container {
            width: 160px; height: 160px; margin: 0 auto 15px; border-radius: 50%;
            border: 4px solid var(--neon-red); overflow: hidden; box-shadow: 0 0 30px rgba(255, 77, 109, 0.3);
        }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }

        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .timer-box { background: rgba(255, 255, 255, 0.05); padding: 10px 5px; border-radius: 12px; }
        .timer-val { font-family: var(--font-destaque); color: var(--neon-green); font-size: 1rem; display: block; }

        .galeria-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .galeria-item { width: 100%; height: 140px; border-radius: 15px; background: #222; overflow: hidden; border: 1px solid var(--neon-red); }
        .galeria-item img { width: 100%; height: 100%; object-fit: cover; }

        .heart { position: fixed; top: -20px; color: var(--neon-red); z-index: 5; animation: fall linear forwards; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <button id="start-btn" onclick="entrar()">Acessar Sistema</button>
    </div>

    <nav id="main-nav">
        <button onclick="showTab('inicio')" id="btn-inicio" class="active">INÍCIO</button>
        <button onclick="showTab('declaracao')" id="btn-declaracao">PARA VOCÊ</button>
        <button onclick="showTab('fotos')" id="btn-fotos">FOTOS</button>
        <button onclick="showTab('interacoes')" id="btn-interacoes">INTERAÇÕES</button>
    </nav>

    <main id="inicio" class="tab-content active">
        <section class="card">
            <div class="photo-container">
                <img src="amor.jpeg.jpeg" alt="FOTO PRINCIPAL">
            </div>
            <h1 style="font-family: var(--font-destaque); margin-bottom: 5px;">MARIA</h1>
            <p style="color: var(--neon-red); font-weight: bold; margin-top: 0;">NAMORADA PERFEITA</p>
        </section>

        <section class="card">
            <p style="font-family: var(--font-destaque); font-size: 0.7rem; letter-spacing: 2px;">CONTANDO CADA SEGUNDO</p>
            <div class="timer-grid">
                <div class="timer-box"><span class="timer-val" id="d">00</span><span style="font-size:0.5rem">DIAS</span></div>
                <div class="timer-box"><span class="timer-val" id="h">00</span><span style="font-size:0.5rem">HRS</span></div>
                <div class="timer-box"><span class="timer-val" id="m">00</span><span style="font-size:0.5rem">MIN</span></div>
                <div class="timer-box"><span class="timer-val" id="s">00</span><span style="font-size:0.5rem">SEG</span></div>
            </div>
        </section>
    </main>

    <main id="declaracao" class="tab-content">
        <div class="heart-ascii-container">
            <div class="ascii-text" id="ascii-heart">
                </div>
            <div class="floating-message">
                <h2>I love you 🤍🤍</h2>
                <p>my heart keeps choosing you</p>
            </div>
        </div>
        <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.6; font-family: var(--font-digital);">K & M - Forever</p>
    </main>

    <main id="fotos" class="tab-content">
        <h2 style="font-family: var(--font-destaque);">NOSSA GALERIA</h2>
        <div class="galeria-grid">
            <div class="galeria-item"><img src="amor.jpeg.jpeg"></div>
            <div class="galeria-item"><img src="amor1.jpeg.jpeg"></div>
            <div class="galeria-item"><img src="Amor1.jpeg.jpeg"></div>
            <div class="galeria-item"><img src="amor3.jpeg.jpeg"></div>
            <div class="galeria-item"><img src="amor4.jpeg.jpeg"></div>
        </div>
    </main>

    <main id="interacoes" class="tab-content">
        <h2 style="font-family: var(--font-destaque);">PLAYGROUND ❤️</h2>

        <div class="card">
            <h3 style="font-size: 0.7rem; text-transform: uppercase;">Aviso Imediato</h3>
            <button class="btn-interativo" onclick="chuvaCores()" style="background: var(--neon-blue); color: #000;">Tô pensando em você! ⚡</button>
        </div>

        <div class="card">
            <h3 style="font-size: 0.7rem; text-transform: uppercase;">Mural de Recados</h3>
            <span id="mural-texto" style="font-style: italic; color: var(--neon-blue); display: block; margin: 10px 0;">"Nenhum recado ainda..."</span>
            <input type="text" id="input-mural" class="input-style" placeholder="Deixe um recado...">
            <button class="btn-interativo" onclick="atualizarMural()">Fixar Recado 📌</button>
        </div>

        <div class="card">
            <h3 style="font-size: 0.7rem; text-transform: uppercase;">Saudômetro</h3>
            <span id="sdd-count" style="font-size: 2.5rem; color: var(--neon-red); font-family: var(--font-destaque); display: block;">0</span>
            <button class="btn-interativo" onclick="matarSaudade()">Estou com saudade ❤️</button>
        </div>

        <div class="card" id="capsula-container">
            <h3 style="font-size: 0.7rem; text-transform: uppercase;">Cápsula do Tempo ⏳</h3>
            <div id="capsula-form">
                <textarea id="texto-capsula" class="input-style" rows="3" placeholder="Mensagem para o futuro..."></textarea>
                <button class="btn-interativo" onclick="selarCapsula()" style="background: #fff; color: #000;">Selar Cápsula</button>
            </div>
            <div id="capsula-status" style="display:none;">
                <p id="countdown-capsula" style="color: var(--neon-red); font-weight: bold;"></p>
            </div>
        </div>
    </main>

    <script>
        function entrar() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-nav').style.display = 'flex';
            gerarCoracaoASCII();
            carregarTudo();
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
        }

        // TIMER
        const dataInicio = new Date(2025, 10, 15, 20, 30); 
        setInterval(() => {
            const diff = new Date() - dataInicio;
            if(diff > 0) {
                document.getElementById('d').innerText = Math.floor(diff / 86400000);
                document.getElementById('h').innerText = Math.floor((diff / 3600000) % 24).toString().padStart(2, '0');
                document.getElementById('m').innerText = Math.floor((diff / 60000) % 60).toString().padStart(2, '0');
                document.getElementById('s').innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
            }
        }, 1000);

        // CORAÇÃO ASCII (REPLICANDO A FOTO)
        function gerarCoracaoASCII() {
            const container = document.getElementById('ascii-heart');
            const heartTemplate = [
                "      I love you I love you           I love you I love you      ",
                "   I love you I love you I love   I love you I love you I love   ",
                " I love you I love you I love you I love you I love you I love you ",
                "I love you I love you I love you I love you I love you I love you I",
                "I love you I love you I love you I love you I love you I love you I",
                " I love you I love you I love you I love you I love you I love you ",
                "  I love you I love you I love you I love you I love you I love   ",
                "    I love you I love you I love you I love you I love you I     ",
                "      I love you I love you I love you I love you I love         ",
                "        I love you I love you I love you I love you              ",
                "          I love you I love you I love you I love                ",
                "            I love you I love you I love you                    ",
                "              I love you I love you I love                      ",
                "                I love you I love you                           ",
                "                  I love you I love                             ",
                "                    I love you                                  ",
                "                      I love                                    ",
                "                        I                                       "
            ];
            container.innerHTML = heartTemplate.join('\n');
        }

        // INTERAÇÕES
        function chuvaCores() { for(let i=0; i<30; i++) setTimeout(createHeart, i*60); }

        function createHeart() {
            const h = document.createElement('div');
            h.classList.add('heart'); h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            const dur = Math.random() * 3 + 3;
            h.style.animationDuration = dur + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), dur * 1000);
        }

        function atualizarMural() {
            const txt = document.getElementById('input-mural').value;
            if(!txt) return;
            localStorage.setItem('mural_msg', txt);
            document.getElementById('mural-texto').innerText = `"${txt}"`;
            document.getElementById('input-mural').value = "";
        }

        let sdds = localStorage.getItem('sdd_val') || 0;
        function matarSaudade() {
            sdds++; localStorage.setItem('sdd_val', sdds);
            document.getElementById('sdd-count').innerText = sdds;
            createHeart();
        }

        function selarCapsula() {
            const txt = document.getElementById('texto-capsula').value;
            if(txt.trim().length < 5) return alert("Escreva um pouco mais!");
            localStorage.setItem('cap_txt', txt);
            localStorage.setItem('cap_date', new Date().getTime());
            verificarCapsula();
        }

        function verificarCapsula() {
            const data = localStorage.getItem('cap_date');
            if(data) {
                document.getElementById('capsula-form').style.display = 'none';
                document.getElementById('capsula-status').style.display = 'block';
                const lib = new Date(parseInt(data)); lib.setFullYear(lib.getFullYear() + 1);
                setInterval(() => {
                    const dist = lib - new Date();
                    if(dist < 0) {
                        document.getElementById('capsula-status').innerHTML = `🔓 Liberado: "${localStorage.getItem('cap_txt')}"`;
                    } else {
                        document.getElementById('countdown-capsula').innerText = `Abre em: ${Math.floor(dist/86400000)} dias`;
                    }
                }, 1000);
            }
        }

        function carregarTudo() {
            document.getElementById('sdd-count').innerText = sdds;
            if(localStorage.getItem('mural_msg')) document.getElementById('mural-texto').innerText = `"${localStorage.getItem('mural_msg')}"`;
            verificarCapsula();
        }
    </script>
</body>
</html>
