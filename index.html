<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA: KAUAN & MARIA ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff4d6d;
            --neon-green: #39ff14;
            --bg-dark: #0f0104;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            overflow-x: hidden;
        }

        /* TELA DE LOADING */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--neon-green);
        }

        /* BOTÃO DE ACESSO */
        #start-btn {
            display: none;
            margin-top: 25px;
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 15px 30px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
            transition: 0.3s;
        }

        #start-btn:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 25px var(--neon-green);
        }

        #main-content {
            display: none;
            padding-bottom: 50px;
        }

        .status-bar {
            display: flex; justify-content: space-around;
            padding: 10px; border-bottom: 1px solid var(--neon-red);
            font-size: 0.7rem; color: var(--neon-red); text-transform: uppercase;
        }

        header { text-align: center; padding: 40px 20px; }
        header h1 { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; text-shadow: 0 0 15px var(--neon-red); }

        .card {
            margin: 20px auto; max-width: 400px;
            border: 1px solid var(--neon-red); background: rgba(255, 77, 109, 0.05);
            padding: 20px; position: relative;
        }

        .card-label { position: absolute; top: -10px; left: 15px; background: var(--bg-dark); padding: 0 10px; color: var(--neon-red); font-size: 0.8rem; font-weight: bold; }

        .photo-container { width: 180px; height: 180px; margin: 0 auto 20px; border: 2px solid var(--neon-red); overflow: hidden; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
