<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA: KAUAN & MARIA ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff4d6d;
            --neon-green: #39ff14;
            --bg-dark: #0f0104;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* TELA INICIAL COM BOTÃO */
        #loader {
            text-align: center;
            z-index: 10000;
            position: fixed;
            background: #000;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #start-btn {
            background: transparent;
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
            padding: 20px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-red);
            text-transform: uppercase;
        }

        /* CONTEÚDO PRINCIPAL (FOTO E TIMER) */
        #main-content {
            display: none;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        .status-bar {
            border-bottom: 1px solid var(--neon-red);
            padding: 10px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .card {
            border: 1px solid var(--neon-red);
            background: rgba(255, 77, 109, 0.05);
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .card-label {
            position: absolute;
            top: -10px;
            left: 10px;
            background: var(--bg-dark);
            padding: 0 10px;
            color: var(--neon-red);
            font-size: 0.7rem;
        }

        .photo-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 15px;
            border: 2px solid var(--neon-red);
            overflow: hidden;
        }

            height: 100%;
