<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAUAN & MARIA ❤️</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff4d6d;
            --neon-green: #39ff14;
            --bg-dark: #0a0104;
            --font-destaque: 'Syne', sans-serif;
            --font-corpo: 'Inter', sans-serif;
            --font-digital: 'Azeret Mono', monospace;
        }

        body { background-color: var(--bg-dark); color: #fff; font-family: var(--font-corpo); margin: 0; padding-bottom: 100px; min-height: 100vh; overflow-x: hidden; }

        /* TELA DE SENHA */
        #tela-senha {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 20000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 15px;
        }

        .input-senha {
            padding: 15px; border-radius: 12px; border: 2px solid var(--neon-red);
            background: #111; color: white; text-align: center; font-family: var(--font-digital); outline: none; width: 200px;
        }

        #start-btn {
            background: var(--neon-red); border: none; color: #fff; padding: 18px 40px;
            font-family: var(--font-destaque); border-radius: 50px; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.4);
        }

        .btn-visitante { background: transparent; border: 1px solid #444; color: #888; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-size: 0.7rem; margin-top: 5px; }

        /* NAVEGAÇÃO */
        nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            padding: 10px 15px; border-radius: 30px; display: none; z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1); width: 90%; max-width: 450px; justify-content: space-between;
        }

        nav button { background: none; border: none; color: #aaa; font-family: var(--font-destaque); font-size: 0.65rem; cursor: pointer; }
        nav button.active { color: var(--neon-red); transform: scale(1.1); }

        .tab-content { display: none; padding: 20px; animation: fadeIn 0.5s ease; max-width: 500px; margin: 0 auto; text-align: center; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .card { border: 2px solid rgba(255, 77, 109, 0.2); background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 20px; margin-bottom: 20px; }

        /* BOTÕES DE INTERAÇÃO */
        .btn-interativo {
            background: var(--neon-red); border: none; padding: 15px; color: white;
            border-radius: 12px; cursor: pointer; font-family: var(--font-destaque);
            width: 100%; margin-top: 10px; text-transform: uppercase; font-size: 0.8rem;
        }
        .btn-interativo:disabled { background: #222; color: #555; cursor: not-allowed; opacity: 0.6; }

        /* TIMER E FOTOS */
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .timer-box { background: rgba(255, 255, 255, 0.05); padding: 10px 5px; border-radius: 12px; }
        .timer-val { font-family: var(--font-destaque); color: var(--neon-green); font-size: 1.1rem; display: block; }
        .galeria-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .galeria-item { width: 100%; height: 140px; border-radius: 15px; overflow: hidden; border: 1px solid var(--neon-red); }
        .galeria-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="tela-senha">
        <h2 style="color:var(--neon-red); font-family: var(--font-destaque);">SISTEMA PRIVADO</h2>
        <input type="password" id="inputPass" class="input-senha" placeholder="SENHA">
        <button id="start-btn" onclick="acessar(true)">Acessar como Casal</button>
        <button class="btn-visitante" onclick="acessar(false)">Entrar como Visitante</button>
    </div>

    <div id="loader" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; justify-content: center; align-items: center;">
        <button id="start-btn" onclick="entrar()">Acessar Sistema</button>
    </div>

    <nav id="main-nav">
        <button onclick="showTab('inicio')" id="btn-inicio" class="active">INÍCIO</button>
        <button onclick="showTab('fotos')" id="btn-fotos">FOTOS</button>
        <button onclick="showTab('interacoes')" id="btn-interacoes">INTERAÇÕES</button>
    </nav>

    <main id="inicio" class="tab-content active">
        <section class="card">
            <h1 style="font-family: var(--font-destaque);">MARIA & KAUAN</h1>
            <div class="timer-grid">
                <div class="timer-box"><span class="timer-val" id="d">00</span><small>DIAS</small></div>
                <div class="timer-box"><span class="timer-val" id="h">00</span><small>HRS</small></div>
                <div class="timer-box"><span class="timer-val" id="m">00</span><small>MIN</small></div>
                <div class="timer-box"><span class="timer-val" id="s">00</span><small>SEG</small></div>
            </div>
        </section>
    </main>

    <main id="fotos" class="tab-content">
        <div class="galeria-grid">
            <div class="galeria-item"><img src="amor.jpeg.jpeg"></div>
            <div class="galeria-item"><img src="amor1.jpeg.jpeg"></div>
        </div>
    </main>

    <!-- AGORA A ABA DE INTERAÇÕES TEM CONTEÚDO -->
    <main id="interacoes" class="tab-content">
        <section class="card">
            <h2 style="font-family: var(--font-destaque);">INTERAÇÕES</h2>
            <p id="txt-permissao" style="font-size: 0.7rem; color: #666; margin-bottom: 15px;">Somente o casal pode usar esses botões.</p>
            <button class="btn-interativo" id="btn1" onclick="alert('❤️ Você enviou um coração!')">Enviar Coração</button>
            <button class="btn-interativo" id="btn2" onclick="alert('💌 Te amo enviado!')">Mandar "Te Amo"</button>
            <button class="btn-interativo" id="btn3" onclick="alert('🎁 Presente virtual enviado!')">Dar Presente</button>
        </section>
    </main>

    <script>
        const senhaCorreta = "2008";
        let ehCasal = false;

        function acessar(comSenha) {
            if (comSenha) {
                if (document.getElementById('inputPass').value === senhaCorreta) {
                    ehCasal = true;
                    localStorage.setItem("acesso", "casal");
                    liberar();
                } else { alert("Senha incorreta!"); }
            } else { ehCasal = false; liberar(); }
        }

        window.onload = function() {
            if (localStorage.getItem("acesso") === "casal") { ehCasal = true; liberar(); }
        };

        function liberar() {
            document.getElementById('tela-senha').style.display = 'none';
            document.getElementById('loader').style.display = 'flex';
            
            if (!ehCasal) {
                document.getElementById('btn1').disabled = true;
                document.getElementById('btn2').disabled = true;
                document.getElementById('btn3').disabled = true;
                document.getElementById('txt-permissao').innerText = "❌ MODO VISITANTE: Botões bloqueados.";
                document.getElementById('txt-permissao').style.color = "var(--neon-red)";
            }
            setInterval(atualizarTempo, 1000);
        }

        function entrar() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-nav').style.display = 'flex';
        }

        function atualizarTempo() {
            const data = new Date("2025-11-16T00:00:00"); // 170 dias atrás
            const diff = new Date() - data;
            document.getElementById('d').innerText = Math.floor(diff / 86400000);
            document.getElementById('h').innerText = Math.floor((diff / 3600000) % 24).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff / 60000) % 60).toString().padStart(2, '0');
            document.getElementById('s').innerText = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        }
    </script>
</body>
</html>
